# Exhale — full stack: Postgres + API + web UI.
#
#   cp .env.example .env      # then edit the secrets
#   docker compose up --build
#
# Web UI:  http://localhost:8080     API: http://localhost:8000

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: exhale
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - exhale_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      EXHALE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/exhale
      EXHALE_MASTER_SECRET: ${EXHALE_MASTER_SECRET:?set EXHALE_MASTER_SECRET in .env}
      # Auth enforcement defaults ON when a database is configured.
      EXHALE_REQUIRE_AUTH: ${EXHALE_REQUIRE_AUTH:-1}
      # Background auto-sync interval in minutes (unset/0 = off):
      EXHALE_AUTO_SYNC_MINUTES: ${EXHALE_AUTO_SYNC_MINUTES:-}
      # Optional live Gmail ingestion (see README):
      EXHALE_GMAIL_ACCESS_TOKEN: ${EXHALE_GMAIL_ACCESS_TOKEN:-}
      EXHALE_GMAIL_REFRESH_TOKEN: ${EXHALE_GMAIL_REFRESH_TOKEN:-}
      EXHALE_GMAIL_CLIENT_ID: ${EXHALE_GMAIL_CLIENT_ID:-}
      EXHALE_GMAIL_CLIENT_SECRET: ${EXHALE_GMAIL_CLIENT_SECRET:-}
      # Optional live Google Calendar ingestion (caregiver availability):
      EXHALE_GCAL_ACCESS_TOKEN: ${EXHALE_GCAL_ACCESS_TOKEN:-}
      EXHALE_GCAL_REFRESH_TOKEN: ${EXHALE_GCAL_REFRESH_TOKEN:-}
      EXHALE_GCAL_CLIENT_ID: ${EXHALE_GCAL_CLIENT_ID:-}
      EXHALE_GCAL_CLIENT_SECRET: ${EXHALE_GCAL_CLIENT_SECRET:-}
      # "Connect Google" / "Connect Outlook" OAuth apps (one registration each):
      EXHALE_GOOGLE_CLIENT_ID: ${EXHALE_GOOGLE_CLIENT_ID:-}
      EXHALE_GOOGLE_CLIENT_SECRET: ${EXHALE_GOOGLE_CLIENT_SECRET:-}
      EXHALE_GOOGLE_REDIRECT_URI: ${EXHALE_GOOGLE_REDIRECT_URI:-}
      EXHALE_MSFT_CLIENT_ID: ${EXHALE_MSFT_CLIENT_ID:-}
      EXHALE_MSFT_CLIENT_SECRET: ${EXHALE_MSFT_CLIENT_SECRET:-}
      EXHALE_MSFT_REDIRECT_URI: ${EXHALE_MSFT_REDIRECT_URI:-}
      # Optional LLM-backed extraction (see README):
      EXHALE_LLM_EXTRACTOR: ${EXHALE_LLM_EXTRACTOR:-0}
      EXHALE_LLM_MODEL: ${EXHALE_LLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional vision extraction (photos/screenshots) — reuses ANTHROPIC_API_KEY:
      EXHALE_VISION_MODEL: ${EXHALE_VISION_MODEL:-}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        # Where the *browser* reaches the API. For LAN/phone access replace
        # localhost with the host machine's address and rebuild.
        VITE_EXHALE_API: ${EXHALE_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  exhale_pgdata:
