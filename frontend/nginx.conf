server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache immutable hashed assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
